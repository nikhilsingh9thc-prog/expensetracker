services:
  - type: web
    name: expensetracker
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn money_mgmt.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --preload"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: expensetracker-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://expensetracker-clwy.onrender.com"
      # --- Superuser auto-creation on first deploy ---
      # Set these in Render Dashboard → Environment → expensetracker service
      # (or uncomment and fill in below — but NEVER commit real passwords)
      # - key: DJANGO_SUPERUSER_USERNAME
      #   value: "admin"
      # - key: DJANGO_SUPERUSER_EMAIL
      #   value: "admin@example.com"
      # - key: DJANGO_SUPERUSER_PASSWORD
      #   value: "YourStrongPasswordHere"

databases:
  - name: expensetracker-db
    plan: free
    databaseName: expensetracker
    user: expensetracker
